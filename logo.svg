<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
    <!-- White Background -->
    <rect width="500" height="500" fill="#FFFFFF" />

    <!-- Outer Frame -->
    <rect x="50" y="50" width="400" height="400" rx="60" fill="none" stroke="#111111" stroke-width="8" />

    <!-- Abstract 'N' / Newspaper Fold Symbol -->
    <!-- Teal Left Pillar -->
    <path d="M 170 160 L 170 300" stroke="#4FC3F7" stroke-width="40" stroke-linecap="round" />
    <!-- Diagonal Fold -->
    <path d="M 170 160 L 330 300" stroke="#111111" stroke-width="40" stroke-linecap="round" />
    <!-- Black Right Pillar -->
    <path d="M 330 160 L 330 300" stroke="#111111" stroke-width="40" stroke-linecap="round" />
    
    <!-- Accent Dot -->
    <circle cx="170" cy="340" r="20" fill="#4FC3F7" />

    <!-- Typography -->
    <text x="250" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#111111" text-anchor="middle" letter-spacing="3">
        sXamTop
    </text>
    <text x="250" y="435" font-family="monospace" font-size="14" font-weight="600" fill="#AAAAAA" text-anchor="middle" letter-spacing="8">
        NEWS REDEFINED
    </text>
</svg>